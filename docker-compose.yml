services:
  # ─────────────────────────────────────────────
  # Ollama - LLM local
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Decomentează dacă ai GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API - FastAPI cu Instructor
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: llm-product-analyzer
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - CACHE_DIR=/app/cache
    volumes:
      - cache_data:/app/cache
      - ./app:/app/app
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  cache_data:
